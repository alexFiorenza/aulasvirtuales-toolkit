name: Release Please

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Please
        uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout Code
        if: ${{ steps.release.outputs['packages/aulasvirtuales-cli--release_created'] }}
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Formula
        if: ${{ steps.release.outputs['packages/aulasvirtuales-cli--release_created'] }}
        run: |
          VERSION="${{ steps.release.outputs['packages/aulasvirtuales-cli--version'] }}"
          TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/packages/aulasvirtuales-cli-v${VERSION}.tar.gz"
          
          # Download tarball to compute SHA256
          curl -sL $TARBALL_URL -o source.tar.gz
          SHA256=$(sha256sum source.tar.gz | awk '{print $1}')
          
          # Update the Formula file inside the repo
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/aulasvirtuales.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Formula/aulasvirtuales.rb
          sed -i "s|url \".*\"|url \"${TARBALL_URL}\"|" Formula/aulasvirtuales.rb
          
          # Commit the changes back to master
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/aulasvirtuales.rb
          git commit -m "chore: update Homebrew formula for aulasvirtuales-cli v${VERSION}"
          git push
