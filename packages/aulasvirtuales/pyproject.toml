[build-system]
requires = ["setuptools>=68.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[project]
name = "aulasvirtuales"
version = "0.1.0"
description = "Core library to interact with UTN FRBA's Moodle virtual classrooms"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "httpx>=0.27",
    "keyring>=25.0",
    "playwright>=1.40",
]

[project.optional-dependencies]
markdown = [
    "pymupdf4llm>=0.0.10",
]
docx = [
    "docx2pdf>=0.1.8",
]
ocr = [
    "langchain-core>=0.3",
    "langchain-ollama>=0.3",
    "langchain-openrouter>=0.1",
    "pymupdf>=1.24",
]

[tool.setuptools.packages.find]
where = ["src"]
